<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS — Employee Management System</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ── Connection status bar (Socket.io signature) ─────── -->
  <header data-status="disconnected"></header>

  <!-- ── Login Form ──────────────────────────────────────── -->
  <form>
    <fieldset>
      <legend>EMS Portal</legend>
      <p>Sign in to your account</p>

      <label>
        Email
        <input id="login-email" type="email" placeholder="you@company.local" required autocomplete="username">
      </label>

      <label>
        Password
        <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password">
      </label>

      <button type="submit">Sign in</button>
    </fieldset>
  </form>

  <!-- ── App Shell (hidden until authed) ─────────────────── -->
  <section style="display:none">

    <!-- Sidebar -->
    <nav>
      <span>EMS</span>

      <a data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        <span>Dashboard</span>
      </a>

      <a data-page="employees">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>Employees</span>
      </a>

      <a data-page="departments">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Departments</span>
      </a>

      <a data-page="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <span>Projects</span>
      </a>

      <a data-page="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>My Profile</span>
      </a>

      <footer>
        <strong>—</strong>
        <small>—</small>
        <button type="button" id="logout-btn" data-variant="ghost">Sign out</button>
      </footer>
    </nav>

    <!-- Main area -->
    <main>
      <!-- Topbar -->
      <div id="topbar">
        <h1 id="page-title">Dashboard</h1>
        <span id="status-dot" data-status="disconnected">
          <b></b>
          Offline
        </span>
      </div>

      <!-- Page content -->
      <article id="content">
        <p>Loading…</p>
      </article>
    </main>

  </section>

  <!-- ── Toast area ──────────────────────────────────────── -->
  <aside id="toasts"></aside>

  <!-- ── Modal ───────────────────────────────────────────── -->
  <dialog>
    <header>
      <h2>Dialog</h2>
      <button type="button" onclick="this.closest('dialog').close()">✕</button>
    </header>
    <form method="dialog">
      <fieldset></fieldset>
      <footer>
        <button type="button" data-variant="ghost" id="modal-cancel">Cancel</button>
        <button type="submit" id="modal-submit">Save</button>
      </footer>
    </form>
  </dialog>

  <!-- Socket.io client (from your running server) -->
  <script src="http://localhost:3000/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>

</html>
